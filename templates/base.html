{% load static  %}
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block title %}{% endblock title %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="..\static\css\mystyle.css" >
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
  <title>{% block title1 %}Village Portal{% endblock title1 %}</title>

</head>
<body>
    
<nav class="navbar navbar-light bg-white">
  <div class="container d-flex justify-content-center align-items-center text-center">

    <!-- Logo -->
    <a class="navbar-brand village-brand" href="#">
      <h1 class="village-title text-dark">మన ఊరూ</h1>
      <h6 class="village-subtitle text-dark">Hello Farizellipeta</h6>
    </a>

    <!-- Direct Navbar Links -->
    <ul class="navbar-nav flex-row align-items-center gap-4 fw-semibold">

        <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'home' %}"></i> Home</a>
        </li>

        <li class="nav-item">
            <a class="nav-link {% if request.path == '/about/' %}active{% endif %}" href="{% url 'about' %}"></i> About</a>
        </li>

        <li class="nav-item">
            <a class="nav-link {% if request.path == '/services/' %}active{% endif %}" href="{% url 'services' %}"></i> Services</a>
        </li>

        <li class="nav-item">
            <a class="nav-link {% if request.path == '/logout/' %}active{% endif %}" href="{% url 'logout' %}"></i> Logout</a>
        </li>

    </ul>

  </div>
</nav>
</nav>

{% block carousel %}{% endblock carousel %}
   <div class="main"> {% block maincontent %}{% endblock maincontent %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{% static 'js/alert.js' %}"></script>
</body>
</html>
