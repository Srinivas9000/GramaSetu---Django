{% load static  %}
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block title %}{% endblock title %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="..\static\css\mystyle.css" >
  <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
  <title>{% block title1 %}Village Portal{% endblock title1 %}</title>

</head>
<body>
    
<nav class="navbar navbar-expand-lg navbar-light bg-white">
  <div class="container">

    <a class="navbar-brand fw-bold text-dark" href="#">
        <h1 class="village-title text-dark">GramaSetu</h1>
        <sub><h5 class="text-dark">Hello Farizellipeta</h5></sub>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto fw-semibold">

        <li class="nav-item">
            <a class="nav-link text-dark" href="{% url 'home' %}">Home</a>
        </li>

        <li class="nav-item">
            <a class="nav-link text-dark" href="{% url 'about' %}">About</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark" href="{% url 'services' %}">Services</a>
        </li> 
        <li class="nav-item">
          <a class="btn btn-danger" href="{% url 'logout' %}">Logout</a>
        </li>
      </ul>
    </div>

  </div>
</nav>
</nav>

{% block carousel %}{% endblock carousel %}
   <div class="main"> {% block maincontent %}{% endblock maincontent %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="{% static 'js/alert.js' %}"></script>
</body>
</html>
